<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>天陽会透析解析支援ツール Pro</title>

<style>
:root{
 --accent:#0b5ed7;
 --ok:#0f9d58;
 --warn:#d9534f;
 --muted:#6b7280;
 --bg:#f8fafc;
}

body{
 margin:0;
 font-family:"Noto Sans JP",system-ui;
 background:var(--bg);
 padding:14px;
}

.wrap{max-width:800px;margin:auto}

.card{
 background:#fff;
 border-radius:12px;
 padding:14px;
 margin-bottom:14px;
 box-shadow:0 4px 14px rgba(0,0,0,0.05);
}

h1{font-size:18px;margin:0 0 8px}

label{font-size:12px;color:var(--muted)}
input{
 width:100%;
 padding:8px;
 border-radius:8px;
 border:1px solid #e5e7eb;
 margin-bottom:8px;
 font-size:14px;
}

.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px}

button{
 padding:10px;
 border-radius:8px;
 border:none;
 background:var(--accent);
 color:#fff;
 font-weight:700;
 cursor:pointer;
 width:100%;
}

button.secondary{
 background:#e5e7eb;
 color:#333;
 margin-top:6px;
}

table{
 width:100%;
 border-collapse:collapse;
 margin-top:10px;
 font-size:13px;
}

th,td{
 border-bottom:1px solid #eee;
 padding:6px;
 text-align:left;
}

.ok{color:var(--ok);font-weight:700}
.warn{color:var(--warn);font-weight:700}

.advice{
 background:#eef6ff;
 padding:10px;
 border-radius:8px;
 margin-top:10px;
 font-size:13px;
}

@media print{
 button{display:none}
 body{background:#fff}
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>天陽会透析解析支援ツール Pro</h1>

<div class="grid-2">
<div>
<label>患者ID</label>
<input id="patientId">
</div>
<div>
<label>日付</label>
<input type="date" id="examDate">
</div>
</div>

<div class="grid-3">
<div><label>K</label><input id="K"></div>
<div><label>Ca</label><input id="Ca"></div>
<div><label>Alb</label><input id="Alb"></div>
</div>

<div class="grid-3">
<div><label>P</label><input id="P"></div>
<div><label>Hb</label><input id="Hb"></div>
<div><label>iPTH</label><input id="iPTH"></div>
</div>

<div class="grid-3">
<div><label>BUN前</label><input id="BUNpre"></div>
<div><label>BUN後</label><input id="BUNpost"></div>
<div><label>透析時間(分)</label><input id="dialysisTime"></div>
</div>

<div class="grid-3">
<div><label>除水量</label><input id="UF"></div>
<div><label>身長(cm)</label><input id="height"></div>
<div><label>透析前体重</label><input id="weightPre"></div>
</div>

<button onclick="calc()">解析実行</button>
<button class="secondary" onclick="window.print()">A4印刷 / PDF保存</button>
<button class="secondary" onclick="saveData()">保存</button>
<button class="secondary" onclick="loadData()">呼び出し</button>

</div>

<div id="results" class="card" style="display:none"></div>

</div>

<script>
const el=id=>document.getElementById(id)
const toNum=v=>{const n=parseFloat(v);return isNaN(n)?null:n}

function calc(){

const K=toNum(el("K").value)
const Ca=toNum(el("Ca").value)
const Alb=toNum(el("Alb").value)
const P=toNum(el("P").value)
const Hb=toNum(el("Hb").value)
const iPTH=toNum(el("iPTH").value)
const BUNpre=toNum(el("BUNpre").value)
const BUNpost=toNum(el("BUNpost").value)
const dialysisTime=toNum(el("dialysisTime").value)
const UF=toNum(el("UF").value)
const height=toNum(el("height").value)
const weightPre=toNum(el("weightPre").value)

const correctedCa = (Ca && Alb)?(Ca+0.8*(4-Alb)).toFixed(2):null

let spKtV=null
if(BUNpre && BUNpost && dialysisTime && UF && weightPre){
 const t=dialysisTime/60
 const R=BUNpost/BUNpre
 if(R>0){
  spKtV=(-Math.log(R-0.008*t)+(4-3.5*R)*(UF/weightPre)).toFixed(3)
 }
}

let GNRI=null
if(Alb && height && weightPre){
 const ideal=22*(height/100)*(height/100)
 GNRI=(1.489*(Alb*10)+41.7*(weightPre/ideal)).toFixed(1)
}

let html=`<table>
<tr><th>項目</th><th>値</th></tr>
<tr><td>補正Ca</td><td>${correctedCa??"—"}</td></tr>
<tr><td>spKt/V</td><td>${spKtV??"—"}</td></tr>
<tr><td>GNRI</td><td>${GNRI??"—"}</td></tr>
</table>`

let advice=""
if(spKtV && spKtV<1.4) advice+="透析効率不足。時間延長や血流量見直し検討。<br>"
if(P && P>5.5) advice+="リン高値。食事指導・吸着薬調整。<br>"
if(Hb && Hb<10) advice+="貧血傾向。ESA・鉄評価。<br>"

if(advice){
 html+=`<div class="advice"><b>AIアドバイス</b><br>${advice}</div>`
}

el("results").innerHTML=html
el("results").style.display="block"
}

function saveData(){
const data={}
document.querySelectorAll("input").forEach(i=>data[i.id]=i.value)
localStorage.setItem("dialysisData",JSON.stringify(data))
alert("保存しました")
}

function loadData(){
const data=JSON.parse(localStorage.getItem("dialysisData"))
if(!data)return alert("保存データなし")
for(let k in data){
 if(el(k)) el(k).value=data[k]
}
alert("読み込みました")
}

(function(){
const d=new Date()
el("examDate").value=d.toISOString().slice(0,10)
})()
</script>

</body>
</html>
