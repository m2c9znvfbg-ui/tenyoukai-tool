<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>天陽会透析解析支援ツール</title>

<style>
:root{
--bg:#fff; --text:#0b1220; --muted:#6b7280; --accent:#0b5ed7;
--ok:#0f9d58; --warn:#d9534f;
--card-radius:10px; --gap:12px; --maxw:760px;
}
body{
margin:0;
font-family:"Noto Sans JP", system-ui, Roboto, Arial;
background:var(--bg);
color:var(--text);
padding:18px;
}
.wrap{max-width:var(--maxw);margin:0 auto}
.card{
background:#fff;border-radius:10px;padding:12px;
border:1px solid #eef2f6;
box-shadow:0 6px 18px rgba(11,18,34,0.04)
}
input{
width:100%;padding:9px;border-radius:8px;
border:1px solid #e6eef6;font-size:14px;
margin-bottom:8px;
}
.btn{
background:#0b5ed7;color:#fff;padding:9px 12px;
border-radius:8px;border:none;cursor:pointer;
font-weight:700
}
.small{font-size:12px;color:#6b7280}
.ok{color:#0f9d58;font-weight:800}
.warn{color:#d9534f;font-weight:800}
table{width:100%;border-collapse:collapse;margin-top:10px}
th,td{padding:8px;border-bottom:1px solid #f0f4f8;font-size:13px}
th{color:#6b7280}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h3>透析データ入力</h3>

<label>K (mmol/L)</label>
<input id="K">

<label>Alb (g/dL)</label>
<input id="Alb">

<label>Ca (mg/dL)</label>
<input id="Ca">

<label>Hb (g/dL)</label>
<input id="Hb">

<button id="runAnalyze" class="btn">解析実行</button>
</div>

<div id="results" class="card" style="display:none;margin-top:12px">
<strong>解析結果</strong>
<div id="resultBody"></div>
</div>

</div>

<script>
const el=id=>document.getElementById(id);
const isNum=v=>!isNaN(v)&&v!=="";
const toNum=v=>isNum(v)?Number(v):null;

function calcAll(){

const K=toNum(el("K").value);
const Alb=toNum(el("Alb").value);
const Ca=toNum(el("Ca").value);
const Hb=toNum(el("Hb").value);

const correctedCa=(Ca!==null&&Alb!==null)
?Number((Ca+0.8*(4-Alb)).toFixed(2))
:null;

/* 🔒 未入力は必ず null 扱い */
const checks={
K:K===null?null:(K>=3.5&&K<=5.5),
Alb:Alb===null?null:(Alb>=3.5),
Hb:Hb===null?null:(Hb>=10&&Hb<=12),
correctedCa:correctedCa===null?null:(correctedCa>=8.4&&correctedCa<=9.5)
};

const rows=[
["K",K,"3.5–5.5",checks.K],
["Alb",Alb,"≥3.5",checks.Alb],
["Hb",Hb,"10–12",checks.Hb],
["補正Ca",correctedCa,"8.4–9.5",checks.correctedCa]
];

let html="<table><thead><tr><th>項目</th><th>値</th><th>目標</th><th>判定</th></tr></thead><tbody>";

rows.forEach(r=>{
let label;
if(r[3]===true){
label='<span class="ok">OK</span>';
}else if(r[3]===false){
label='<span class="warn">要対応</span>';
}else{
label='<span class="small">未入力</span>';
}
html+=`<tr><td>${r[0]}</td><td>${r[1]??"—"}</td><td>${r[2]}</td><td>${label}</td></tr>`;
});

html+="</tbody></table>";

el("resultBody").innerHTML=html;
el("results").style.display="block";
}

el("runAnalyze").addEventListener("click",calcAll);
</script>

</body>
</html>
