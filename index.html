<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>透析解析レポート入力</title>
<style>
  body{font-family: "Yu Gothic","Meiryo","Segoe UI",sans-serif;background:#f6f8fb;color:#1f2937;margin:0;padding:24px;}
  .container{max-width:980px;margin:0 auto;background:#fff;border-radius:10px;box-shadow:0 6px 18px rgba(15,23,42,0.08);padding:20px;}
  h1{margin:0 0 12px;font-size:20px;color:#0b5ed7;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .full{grid-column:1/-1;}
  label{display:block;font-size:12px;color:#374151;margin-bottom:6px;}
  input[type="text"], input[type="number"], input[type="date"], input[type="datetime-local"], textarea{
    width:100%;padding:8px 10px;border:1px solid #e6eef8;border-radius:6px;background:#fbfdff;
    box-sizing:border-box;font-size:14px;color:#0f1724;
  }
  textarea{min-height:80px;resize:vertical;}
  .btn-row{display:flex;gap:10px;align-items:center;margin-top:14px;}
  button{background:#0b5ed7;color:#fff;border:none;padding:10px 16px;border-radius:8px;font-weight:600;cursor:pointer;}
  button.secondary{background:#6c757d;}
  .card{background:#f8fafc;border-radius:8px;padding:12px;box-shadow:inset 0 0 0 1px rgba(11,94,215,0.04);font-size:13px;}
  .note{font-size:12px;color:#6b7280;margin-top:8px;}
</style>
</head>
<body>
<div class="container">
  <h1>透析解析レポート入力</h1>

  <div class="card note">必須：患者ID・採血日。入力後「送信」ボタンで Google フォームへ自動送信され、スプレッドシートに蓄積されます。</div>

  <form id="inputForm" onsubmit="event.preventDefault(); submitToGoogleForm();">
    <div class="grid" style="margin-top:12px;">
      <div>
        <label>患者ID（必須）</label>
        <input id="patientId" type="text" required placeholder="例: P12345">
      </div>

      <div>
        <label>採血日（必須）</label>
        <input id="examDate" type="date" required>
      </div>

      <div>
        <label>K（数値）</label>
        <input id="K" type="number" step="0.01" min="0">
      </div>

      <div>
        <label>Ca（数値）</label>
        <input id="Ca" type="number" step="0.01">
      </div>

      <div>
        <label>Alb（数値）</label>
        <input id="Alb" type="number" step="0.01">
      </div>

      <div>
        <label>P（数値）</label>
        <input id="P" type="number" step="0.01">
      </div>

      <div>
        <label>iPTH（数値）</label>
        <input id="iPTH" type="number" step="0.1">
      </div>

      <div>
        <label>Hb（数値）</label>
        <input id="Hb" type="number" step="0.01">
      </div>

      <div>
        <label>Fe（数値）</label>
        <input id="Fe" type="number" step="0.1">
      </div>

      <div>
        <label>TIBC（数値）</label>
        <input id="TIBC" type="number" step="0.1">
      </div>

      <div>
        <label>Ferritin（数値）</label>
        <input id="Ferritin" type="number" step="0.1">
      </div>

      <div>
        <label>BUN前（数値）</label>
        <input id="BUNpre" type="number" step="0.1">
      </div>

      <div>
        <label>BUN後（数値）</label>
        <input id="BUNpost" type="number" step="0.1">
      </div>

      <div>
        <label>透析時間（分）</label>
        <input id="dialysisTime" type="number" step="1" min="0">
      </div>

      <div>
        <label>除水量（kg）</label>
        <input id="UF" type="number" step="0.1">
      </div>

      <div>
        <label>身長（cm）</label>
        <input id="height" type="number" step="0.1">
      </div>

      <div>
        <label>透析前体重（kg）</label>
        <input id="weightPre" type="number" step="0.1">
      </div>

      <div>
        <label>透析後体重（kg）</label>
        <input id="weightPost" type="number" step="0.1">
      </div>

      <div>
        <label>IDWG（kg）</label>
        <input id="idwg" type="number" step="0.01">
      </div>

      <div>
        <label>尿Na（mEq/L）</label>
        <input id="urineNa" type="number" step="0.1">
      </div>

      <div>
        <label>尿量（L）</label>
        <input id="urineVol" type="number" step="0.01">
      </div>

      <div>
        <label>塩分手入力（g/day）</label>
        <input id="saltManual" type="number" step="0.01">
      </div>

      <div class="full">
        <label>CEコメント</label>
        <textarea id="comment" placeholder="任意のコメントを入力"></textarea>
      </div>
    </div>

    <div class="btn-row">
      <button type="submit">送信</button>
      <button type="button" class="secondary" onclick="resetForm()">クリア</button>
      <div style="margin-left:auto;font-size:12px;color:#6b7280;">送信は非同期で行われます。完了通知が出ます。</div>
    </div>
  </form>
</div>

<script>
/* ---------- Googleフォーム設定（あなたのフォームに合わせて既に埋め済み） ---------- */
const GOOGLE_FORM_ACTION = "https://docs.google.com/forms/d/e/1FAIpQLSeY4hJIo8fqT__MURh4__OJCJJFC7OuAIN0m93NezKSxWwXhA/formResponse";
const ENTRY = {
  patientId: "entry.1408149842",
  examDate:  "entry.682524855",
  K:         "entry.902839305",
  Ca:        "entry.1282247271",
  Alb:       "entry.553676846",
  P:         "entry.1122270247",
  iPTH:      "entry.828508291",
  Hb:        "entry.1432055817",
  Fe:        "entry.269083043",
  TIBC:      "entry.905449551",
  Ferritin:  "entry.1043305105",
  BUNpre:    "entry.1271587686",
  BUNpost:   "entry.2051670408",
  dialysisTime:"entry.1989053109",
  UF:        "entry.1017877093",
  height:    "entry.2020297135",
  weightPre: "entry.1596697131"
  /* 透析後体重やコメントの entry が判明したらここに追加してください */
};

/* ---------- ユーティリティ ---------- */
const el = id => document.getElementById(id);
const num = v => { const n = parseFloat(v); return isNaN(n) ? "" : n; }

/* ---------- 計算ロジック（補正Ca・GNRI・塩分推定など） ---------- */
function computeFieldsForForm(){
  const Alb = num(el("Alb")?.value);
  const height = num(el("height")?.value);
  const weightPre = num(el("weightPre")?.value);
  const Ca_raw = num(el("Ca")?.value);

  const correctedCa = (Ca_raw !== "" && Alb !== "") ? (Ca_raw + 0.8 * (4 - Alb)) : (el("Ca")?.value || "");
  let GNRI = "";
  if(Alb !== "" && height !== "" && weightPre !== ""){
    const ideal = 22 * (height/100) * (height/100);
    GNRI = (1.489 * (Alb*10) + 41.7 * (weightPre / ideal)).toFixed(2);
  }

  const saltManual = el("saltManual")?.value || "";
  let saltEst = "";
  if(saltManual) saltEst = saltManual;
  else {
    const idwg = num(el("idwg")?.value);
    const urineNa = num(el("urineNa")?.value);
    const urineVol = num(el("urineVol")?.value);
    if(urineNa !== "" && urineVol !== "") saltEst = (urineNa * urineVol * 23 / 1000 * 2.54).toFixed(2);
    else if(idwg !== "") saltEst = (3 + 4 * idwg).toFixed(2);
  }

  return {
    patientId: el("patientId")?.value || "",
    examDate: el("examDate")?.value || "",
    K: el("K")?.value || "",
    Ca: correctedCa || "",
    Alb: el("Alb")?.value || "",
    P: el("P")?.value || "",
    iPTH: el("iPTH")?.value || "",
    Hb: el("Hb")?.value || "",
    Fe: el("Fe")?.value || "",
    TIBC: el("TIBC")?.value || "",
    Ferritin: el("Ferritin")?.value || "",
    BUNpre: el("BUNpre")?.value || "",
    BUNpost: el("BUNpost")?.value || "",
    dialysisTime: el("dialysisTime")?.value || "",
    UF: el("UF")?.value || "",
    height: el("height")?.value || "",
    weightPre: el("weightPre")?.value || "",
    weightPost: el("weightPost")?.value || "",
    idwg: el("idwg")?.value || "",
    urineNa: el("urineNa")?.value || "",
    urineVol: el("urineVol")?.value || "",
    saltEst: saltEst || "",
    comment: el("comment")?.value || ""
  };
}

/* ---------- Googleフォームへ送信（hidden iframe） ---------- */
function submitToGoogleForm(){
  const payload = computeFieldsForForm();

  // 必須チェック（簡易）
  if(!payload.patientId || !payload.examDate){
    alert("患者IDと採血日を入力してください。");
    return;
  }

  // hidden iframe を作成（なければ）
  let iframe = document.getElementById("hidden_iframe");
  if(!iframe){
    iframe = document.createElement("iframe");
    iframe.style.display = "none";
    iframe.name = "hidden_iframe";
    iframe.id = "hidden_iframe";
    document.body.appendChild(iframe);
  }

  // form を動的作成して submit（画面遷移しない）
  const form = document.createElement("form");
  form.action = GOOGLE_FORM_ACTION;
  form.method = "POST";
  form.target = "hidden_iframe";

  function addField(entryId, value){
    const input = document.createElement("input");
    input.type = "hidden";
    input.name = entryId;
    input.value = value != null ? value : "";
    form.appendChild(input);
  }

  // ENTRY マッピング（既知の項目）
  addField(ENTRY.patientId, payload.patientId);
  addField(ENTRY.examDate, payload.examDate);
  addField(ENTRY.K, payload.K);
  addField(ENTRY.Ca, payload.Ca);
  addField(ENTRY.Alb, payload.Alb);
  addField(ENTRY.P, payload.P);
  addField(ENTRY.iPTH, payload.iPTH);
  addField(ENTRY.Hb, payload.Hb);
  addField(ENTRY.Fe, payload.Fe);
  addField(ENTRY.TIBC, payload.TIBC);
  addField(ENTRY.Ferritin, payload.Ferritin);
  addField(ENTRY.BUNpre, payload.BUNpre);
  addField(ENTRY.BUNpost, payload.BUNpost);
  addField(ENTRY.dialysisTime, payload.dialysisTime);
  addField(ENTRY.UF, payload.UF);
  addField(ENTRY.height, payload.height);
  addField(ENTRY.weightPre, payload.weightPre);

  // 追加項目（フォームに entry があればここに追記してください）
  // 例: addField("entry.XXXXXXXXX", payload.weightPost);
  // 例: addField("entry.YYYYYYYYYY", payload.comment);

  // 監査用に計算値も送る（必要なら entry を追加して送信）
  // 例: addField("entry.GNRI_ENTRY_ID", payload.GNRI);

  document.body.appendChild(form);

  iframe.onload = function(){
    alert("送信が完了しました。スプレッドシートを確認してください。");
    form.remove();
  };

  form.submit();
}

/* ---------- 補助 ---------- */
function resetForm(){
  document.getElementById("inputForm").reset();
}
</script>
</body>
</html>
